# Render Blueprint — backend (FastAPI).
# Create from Render dashboard → New → Blueprint, pointed at this repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: growthx-ringg-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: RINGG_API_KEY
        sync: false
      - key: RINGG_BASE_URL
        value: https://prod-api.ringg.ai/ca/api/v0
      - key: RINGG_ASSISTANT_ID
        sync: false
      - key: RINGG_FROM_NUMBER_ID
        sync: false
      - key: RINGG_WEBHOOK_SECRET
        sync: false
      # Comma-separated frontend origins (your Vercel URL).
      - key: CORS_ORIGINS
        sync: false
