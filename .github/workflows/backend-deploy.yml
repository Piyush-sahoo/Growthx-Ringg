name: Backend Deploy (Render)

# Render is connected to this repo with autoDeploy = on, so every push to main
# that touches backend/** is deployed automatically by Render (native CD).
#
# This workflow is a MANUAL redeploy button (workflow_dispatch). It triggers a
# fresh Render deploy via the API, so you can redeploy without a new commit.
#
# Required (already configured):
#   secrets:   RENDER_API_KEY, RENDER_SERVICE_ID
#   variables: ENABLE_RENDER_DEPLOY = true

on:
  workflow_dispatch:
    inputs:
      clear_cache:
        description: "Clear build cache before deploy"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_RENDER_DEPLOY == 'true' }}
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          CLEAR_CACHE: ${{ inputs.clear_cache && 'clear' || 'do_not_clear' }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "RENDER_API_KEY / RENDER_SERVICE_ID not set." >&2
            exit 1
          fi
          resp=$(curl -fsSL -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"clearCache\":\"${CLEAR_CACHE}\"}")
          echo "$resp"
          echo "Render deploy triggered."
